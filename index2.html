<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aditya AI Summarizer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 20px;
  width: 400px;
  text-align: center;
  box-shadow: 0 0 40px rgba(0,255,255,0.2);
}

h1 {
  margin-bottom: 10px;
}

p {
  font-size: 14px;
  color: #ccc;
}

/* Upload box */
.upload-box {
  border: 2px dashed rgba(255,255,255,0.3);
  padding: 25px;
  border-radius: 15px;
  margin: 20px 0;
  cursor: pointer;
  transition: 0.3s;
}

.upload-box:hover {
  border-color: #00f2fe;
  box-shadow: 0 0 15px #00f2fe;
}

/* File preview */
.file-preview {
  display: none;
  background: rgba(255,255,255,0.08);
  padding: 10px;
  border-radius: 10px;
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.remove-btn {
  color: red;
  cursor: pointer;
  font-weight: bold;
}

/* Button */
button {
  background: linear-gradient(45deg, #00f2fe, #4facfe);
  border: none;
  padding: 12px 25px;
  border-radius: 30px;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px #00f2fe;
}

/* Loader */
.loader {
  margin-top: 15px;
  display: none;
}

.loader div {
  width: 10px;
  height: 10px;
  background: #00f2fe;
  border-radius: 50%;
  display: inline-block;
  animation: bounce 1.2s infinite;
}

.loader div:nth-child(2) { animation-delay: 0.2s; }
.loader div:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { transform: scale(0); }
  40% { transform: scale(1); }
}

/* Status */
#status {
  margin-top: 10px;
  font-size: 14px;
}

/* Download */
#downloadLink {
  display: none;
  margin-top: 15px;
  color: #00f2fe;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
  <h1>⚡ ADITYA AI</h1>
  <p>Upload your document & get smart summary</p>

  <div class="upload-box" onclick="document.getElementById('fileInput').click()">
    Click or Drag File Here
  </div>

  <input type="file" id="fileInput" hidden>

  <div class="file-preview" id="filePreview">
    <span id="fileName"></span>
    <span class="remove-btn" onclick="removeFile()">❌</span>
  </div>

  <button onclick="uploadFile()">Summarize</button>

  <div class="loader" id="loader">
    <div></div><div></div><div></div>
  </div>

  <p id="status"></p>

  <a id="downloadLink">⬇ Download Summary</a>
</div>

<script>
let selectedFile = null;

document.getElementById("fileInput").addEventListener("change", function(e) {
    selectedFile = e.target.files[0];

    if (selectedFile) {
        document.getElementById("fileName").innerText = selectedFile.name;
        document.getElementById("filePreview").style.display = "flex";
    }
});

function removeFile() {
    selectedFile = null;
    document.getElementById("fileInput").value = "";
    document.getElementById("filePreview").style.display = "none";
}

async function uploadFile() {
    const status = document.getElementById("status");
    const loader = document.getElementById("loader");
    const link = document.getElementById("downloadLink");

    if (!selectedFile) {
        status.innerText = "⚠ Please select a file first";
        return;
    }

    loader.style.display = "block";
    status.innerText = "🚀 Processing...";
    link.style.display = "none";

    const formData = new FormData();
    formData.append("file", selectedFile);

    try {
        const response = await fetch("https://adisworkflow.app.n8n.cloud/webhook/9eb92ac3-ae00-499d-b664-c3d4bed414cc", {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            throw new Error("Server issue");
        }

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);

        link.href = url;
        link.download = "summary.txt";
        link.style.display = "block";

        status.innerText = "✅ Summary Ready!";
    } catch (error) {
        status.innerText = "❌ Something went wrong. Please try again.";
        console.error(error);
    }

    loader.style.display = "none";
}
</script>

</body>
</html>

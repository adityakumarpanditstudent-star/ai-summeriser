<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Aditya AI Summarizer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top, #1a1a2e, #0f3460, #000);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Glass Card */
.container {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  width: 380px;
  box-shadow: 0 0 40px rgba(0,255,255,0.2);
  animation: fadeIn 1s ease;
}

h1 {
  font-size: 26px;
  margin-bottom: 10px;
}

p {
  font-size: 14px;
  color: #ccc;
}

.upload-box {
  border: 2px dashed rgba(255,255,255,0.3);
  padding: 20px;
  border-radius: 15px;
  margin: 20px 0;
  cursor: pointer;
  transition: 0.3s;
}

.upload-box:hover {
  border-color: #00f2fe;
  box-shadow: 0 0 15px #00f2fe;
}

button {
  background: linear-gradient(45deg, #00f2fe, #4facfe);
  border: none;
  padding: 12px 25px;
  border-radius: 30px;
  color: white;
  font-size: 15px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px #00f2fe;
}

#status {
  margin-top: 15px;
  font-size: 14px;
}

#downloadLink {
  display: none;
  margin-top: 20px;
  color: #00f2fe;
  font-weight: bold;
  text-decoration: none;
}

.loader {
  border: 4px solid rgba(255,255,255,0.2);
  border-top: 4px solid #00f2fe;
  border-radius: 50%;
  width: 25px;
  height: 25px;
  animation: spin 1s linear infinite;
  margin: 10px auto;
  display: none;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

@keyframes fadeIn {
  from {opacity:0; transform: translateY(20px);}
  to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<div class="container">
  <h1>⚡ ADITYA AI</h1>
  <p>Upload your document & get instant summary</p>

  <div class="upload-box" onclick="document.getElementById('fileInput').click()">
    Click or Drag File Here
  </div>

  <input type="file" id="fileInput" hidden>

  <button onclick="uploadFile()">Summarize</button>

  <div class="loader" id="loader"></div>
  <p id="status"></p>

  <a id="downloadLink">⬇ Download Summary</a>
</div>

<script>
async function uploadFile() {
    const file = document.getElementById('fileInput').files[0];

    if (!file) {
        alert("Please select a file");
        return;
    }

    const loader = document.getElementById("loader");
    const status = document.getElementById("status");
    const link = document.getElementById("downloadLink");

    loader.style.display = "block";
    status.innerText = "🚀 Processing...";
    link.style.display = "none";

    const formData = new FormData();
    formData.append("file", file);

    try {
        const response = await fetch("https://adisworkflow.app.n8n.cloud/webhook/9eb92ac3-ae00-499d-b664-c3d4bed414cc", {
            method: "POST",
            body: formData
        });

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);

        link.href = url;
        link.download = "summary.txt";
        link.style.display = "block";

        status.innerText = "✅ Summary Ready!";
    } catch (error) {
        status.innerText = "❌ Error! Check workflow.";
        console.error(error);
    }

    loader.style.display = "none";
}
</script>

</body>
</html>
